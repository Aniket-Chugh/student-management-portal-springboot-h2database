<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Management Portal Dashboard">
    <title>Student Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }

        /* New Layout Structure: Stacked instead of Side-by-Side */
        .portal-layout {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Animations */
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes spinPulse {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .animate-header {
            animation: slideDown 0.6s ease-out forwards;
        }

        .animate-card-1 {
            animation: fadeInScale 0.6s ease-out 0.2s forwards;
            opacity: 0; /* Starts hidden before animation */
        }

        .animate-card-2 {
            animation: fadeInScale 0.6s ease-out 0.4s forwards;
            opacity: 0;
        }

        /* Hover effect for the refresh button */
        #refresh-btn:hover svg {
            animation: spinPulse 0.8s ease-in-out;
            color: #007bff;
        }

        /* Hover lift for the cards to make them dynamic */
        .module-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .module-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>

    <main class="container">

        <header class="animate-header">
            <h1>Student Management Portal</h1>
            <p>System Administration & Directory</p>
        </header>

        <section class="portal-layout">

            <div class="module-card animate-card-1">
                <h2 id="form-title">Register Student</h2>
                <form id="student-form">
                    <input type="hidden" id="student-id">

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="name">Student Name</label>
                            <input type="text" id="name" placeholder="Full legal name">
                            <span class="error-msg" id="error-name"></span>
                        </div>

                        <div class="form-group half">
                            <label for="email">Contact Email</label>
                            <input type="email" id="email" placeholder="student@university.edu">
                            <span class="error-msg" id="error-email"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="Age in years">
                            <span class="error-msg" id="error-age"></span>
                        </div>

                        <div class="form-group half">
                            <label for="course">Enrolled Program</label>
                            <input type="text" id="course" placeholder="Major or Degree">
                            <span class="error-msg" id="error-course"></span>
                        </div>
                    </div>

                    <div id="general-error" class="error-msg backend-error"></div>

                    <div class="form-actions">
                        <button type="submit" class="btn primary" id="submit-btn">Register Record</button>
                        <button type="button" class="btn secondary" id="cancel-btn" style="display: none;">Clear Form</button>
                    </div>
                </form>
            </div>

            <div class="module-card animate-card-2">
                <div class="list-header">
                    <h2>Active Directory</h2>
                    <button class="btn icon-btn" id="refresh-btn" title="Sync Data">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                        </svg>
                    </button>
                </div>

                <div class="table-container">
                    <table id="students-table">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Email Address</th>
                                <th>Age</th>
                                <th>Program</th>
                                <th class="actions-col">Manage</th>
                            </tr>
                        </thead>
                        <tbody id="student-tbody">
                            </tbody>
                    </table>
                </div>

                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <p>The directory is currently empty. Please register a student above.</p>
                </div>
            </div>

        </section>
    </main>

    <script src="/js/main.js"></script>
</body>

</html>
